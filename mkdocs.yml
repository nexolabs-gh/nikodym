site_name: Nikodym RiskLib
site_description: >-
  Librería Python de riesgo de crédito: scoring/scorecards, ML, provisiones CMF (Chile)
  e IFRS 9/ECL, forward-looking y stress testing.
site_author: Nikodym
repo_url: https://github.com/nexolabs-gh/nikodym
repo_name: nexolabs-gh/nikodym
site_url: https://docs.nikodym.cl/

# El sitio de documentación vive en `docs_site/` para NO colisionar con `docs/`, que aloja el
# diseño interno (SDDs en `docs/design/`, especificaciones, roadmap) y no es parte del sitio público.
docs_dir: docs_site
site_dir: site

theme:
  name: material
  language: es
  custom_dir: docs_site/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Conceptos: concepts.md
  - Referencia de la API: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # `src/` layout: griffe encuentra el paquete sin depender de la instalación.
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: false
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
