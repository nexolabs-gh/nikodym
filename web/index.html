<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Aplica el tema ANTES del paint (evita flash): elección guardada o, si no hay,
         el default de la casa = oscuro navy. El toggle persiste en localStorage. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem("nikodym-theme")
          if (t !== "light") document.documentElement.classList.add("dark")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nikodym RiskLib — editor visual del config y visor de resultados del motor de riesgo de crédito."
    />
    <!-- Tipografía de la casa (Fontshare): Cabinet Grotesk (display) + Satoshi (sans) + Spline Sans Mono (mono) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&f[]=spline-sans-mono@400,500&display=swap"
    />
    <title>Nikodym RiskLib</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
