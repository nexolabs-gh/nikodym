<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Aplica el tema ANTES del paint (evita flash): elección guardada o, si no hay,
         el default de la casa = oscuro navy. El toggle persiste en localStorage. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem("nikodym-theme")
          if (t !== "light") document.documentElement.classList.add("dark")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      La descripción se lee sola (buscador, previsualización de un link), así que la salvedad viaja
      dentro de ella: el motor calcula IFRS 9, CMF y stress, pero la interfaz llega al scorecard y a
      las provisiones (los otros dominios se usan desde Python). Debe casar con el hero de la landing.
    -->
    <meta
      name="description"
      content="Motor de riesgo de crédito en Python (Apache-2.0). Calcula provisiones CMF e IFRS 9, stress testing, matrices de transición y forward-looking; la interfaz cubre el scorecard y las provisiones de punta a punta, con el informe que lo defiende."
    />
    <!-- Tipografía de la casa (Fontshare): Cabinet Grotesk (display) + Satoshi (sans) + Spline Sans Mono (mono) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&f[]=spline-sans-mono@400,500&display=swap"
    />
    <title>Nikodym RiskLib</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
